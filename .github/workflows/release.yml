name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  guard:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Check tag, versions, and CHANGELOG
        run: python3 scripts/check_release.py --tag "$GITHUB_REF_NAME"

  build:
    name: Build and inspect release artifacts
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Set build timestamp from the tagged commit
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Install pinned build tools
        run: python -m pip install build==1.5.0 twine==6.2.0

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Build release artifacts once
        run: |
          python scripts/build_zipapp.py --output-dir dist
          python -m build --sdist --wheel --outdir dist

      - name: Inspect Python distributions
        run: |
          python scripts/check_distribution.py --dist-dir dist
          python -m twine check dist/*.whl dist/*.tar.gz

      - name: Smoke test zipapps
        run: |
          python dist/agentflow.pyz --version
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            | python dist/agentflow-mcp.pyz | grep -q '"serverInfo"'

      - name: Upload release distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions
          path: |
            dist/agentflow.pyz
            dist/agentflow-mcp.pyz
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  clean-install-wheel:
    name: Clean-install wheel on Python ${{ matrix.python-version }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist

      - name: Install and smoke wheel
        run: |
          python -m venv "$RUNNER_TEMP/wheel-venv"
          shopt -s nullglob
          wheels=(dist/*.whl)
          test "${#wheels[@]}" -eq 1
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install --no-index "${wheels[0]}"
          export PATH="$RUNNER_TEMP/wheel-venv/bin:$PATH"
          agentflow --version
          agentflow --help
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            | agentflow-mcp | grep -q '"serverInfo"'
          agentflow verify-proof --root \
            tests/fixtures/compatibility/released-v0.4.0

  clean-install-sdist:
    name: Clean-install sdist on Python 3.11
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist

      - name: Install and smoke sdist
        run: |
          python -m venv "$RUNNER_TEMP/sdist-venv"
          "$RUNNER_TEMP/sdist-venv/bin/python" -m pip install setuptools==83.0.0
          shopt -s nullglob
          sdists=(dist/*.tar.gz)
          test "${#sdists[@]}" -eq 1
          "$RUNNER_TEMP/sdist-venv/bin/python" -m pip install --no-index --no-build-isolation "${sdists[0]}"
          export PATH="$RUNNER_TEMP/sdist-venv/bin:$PATH"
          agentflow --version

  github-release:
    name: Create GitHub release
    needs:
      - guard
      - clean-install-wheel
      - clean-install-sdist
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download tested artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist

      - name: Validate release and extract notes
        run: >-
          python3 scripts/check_release.py
          --tag "$GITHUB_REF_NAME"
          --notes-file "$RUNNER_TEMP/release-notes.md"

      - name: Generate checksums
        working-directory: dist
        run: |
          shopt -s nullglob
          wheels=(agentflow_proof-*.whl)
          sdists=(agentflow_proof-*.tar.gz)
          test "${#wheels[@]}" -eq 1
          test "${#sdists[@]}" -eq 1
          sha256sum agentflow.pyz agentflow-mcp.pyz \
            "${wheels[0]}" "${sdists[0]}" > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          wheels=(dist/agentflow_proof-*.whl)
          sdists=(dist/agentflow_proof-*.tar.gz)
          test "${#wheels[@]}" -eq 1
          test "${#sdists[@]}" -eq 1
          gh release create "$GITHUB_REF_NAME" \
            dist/agentflow.pyz dist/agentflow-mcp.pyz \
            "${wheels[0]}" "${sdists[0]}" dist/SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

  publish-pypi:
    name: Publish Python distributions to PyPI
    needs:
      - guard
      - clean-install-wheel
      - clean-install-sdist
      - github-release
    if: false # Issue #5 compatibility freeze
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Download tested artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist

      - name: Stage PyPI distributions
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          test "${#wheels[@]}" -eq 1
          test "${#sdists[@]}" -eq 1
          mkdir pypi-dist
          cp "${wheels[0]}" "${sdists[0]}" pypi-dist/

      - uses: pypa/gh-action-pypi-publish@2834a314042ef964da07689278dd1e9d773e8afd # v1.14.1
        with:
          packages-dir: pypi-dist/
