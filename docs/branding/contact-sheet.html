<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:ui-monospace,monospace;background:#0B1120;color:#F1F5F9}
h2{font-size:12px;letter-spacing:.1em;color:#94A3B8;text-transform:uppercase;margin:26px 20px 10px}
.row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;padding:0 20px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.cell small{font-size:10px;color:#94A3B8}
.tile{display:grid;place-items:center;border-radius:8px;border:1px solid #374151}
.dark{background:#111827}.light{background:#F1F5F9}
.t16{width:16px;height:16px}.t24{width:24px;height:24px}.t32{width:32px;height:32px}
.t48{width:48px;height:48px}.t64{width:64px;height:64px}.t96{width:96px;height:96px;padding:14px}
img,svg{display:block}
.mark{width:68px;height:68px}
.pane{background:#F1F5F9;color:#0F172A;padding:1px 0 18px;margin-top:20px}.pane h2{color:#64748B}
</style></head><body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <symbol id="mono-mark" viewBox="0 0 128 128">
    <g stroke="currentColor" stroke-width="9" stroke-linecap="round">
      <path d="M18 40 L57 40"/><path d="M18 64 L57 64"/><path d="M18 88 L57 88"/>
      <path d="M71 40 L88 40"/><path d="M71 64 L88 64"/><path d="M71 88 L88 88"/>
    </g>
    <rect x="58" y="22" width="12" height="84" rx="6" fill="currentColor"/>
    <g fill="currentColor">
      <path d="M86 32 L106 40 L86 48 Z"/><path d="M86 56 L106 64 L86 72 Z"/><path d="M86 80 L106 88 L86 96 Z"/>
    </g>
  </symbol>
</svg>
<h2>favicon.svg — small-size gauntlet (dark)</h2>
<div class="row">
  <div class="cell"><div class="tile dark t16"><img class="t16" src="favicon.svg" alt=""></div><small>16</small></div>
  <div class="cell"><div class="tile dark t24"><img class="t24" src="favicon.svg" alt=""></div><small>24</small></div>
  <div class="cell"><div class="tile dark t32"><img class="t32" src="favicon.svg" alt=""></div><small>32</small></div>
  <div class="cell"><div class="tile dark t48"><img class="t48" src="favicon.svg" alt=""></div><small>48</small></div>
  <div class="cell"><div class="tile dark t64"><img class="t64" src="favicon.svg" alt=""></div><small>64</small></div>
</div>
<h2>primary mark (dark)</h2>
<div class="row">
  <div class="cell"><div class="tile dark t96"><img width="68" src="agentflow-mark.svg" alt=""></div><small>mark · gate/ledger</small></div>
  <div class="cell"><div class="tile dark t96" style="color:#F1F5F9"><svg class="mark" aria-hidden="true"><use href="#mono-mark"/></svg></div><small>mono → white</small></div>
  <div class="cell"><div class="tile dark t96" style="color:#00D4AA"><svg class="mark" aria-hidden="true"><use href="#mono-mark"/></svg></div><small>mono → teal</small></div>
</div>
<h2>lockup + badge (dark)</h2>
<div class="row">
  <div class="cell"><img src="agentflow-lockup-dark.svg" width="320" alt=""><small>lockup-dark</small></div>
  <div class="cell"><img src="agentflow-badge.svg" alt=""><small>badge</small></div>
</div>
<div class="pane">
<h2>favicon + marks (light)</h2>
<div class="row">
  <div class="cell"><div class="tile light t16"><img class="t16" src="favicon.svg" alt=""></div><small>16</small></div>
  <div class="cell"><div class="tile light t32"><img class="t32" src="favicon.svg" alt=""></div><small>32</small></div>
  <div class="cell"><div class="tile light t96"><img width="68" src="agentflow-mark-light.svg" alt=""></div><small>mark-light</small></div>
  <div class="cell"><div class="tile light t96" style="color:#0F172A"><svg class="mark" aria-hidden="true"><use href="#mono-mark"/></svg></div><small>mono → ink</small></div>
</div>
<h2>lockup + badge (light)</h2>
<div class="row">
  <div class="cell"><img src="agentflow-lockup-light.svg" width="320" alt=""><small>lockup-light</small></div>
  <div class="cell"><img src="agentflow-badge.svg" alt=""><small>badge</small></div>
</div>
</div>
</body></html>
